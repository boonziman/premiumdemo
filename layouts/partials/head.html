{{- /*  <head> partial — v2: Syne + Outfit, Material Design tokens  */ -}}
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>{{ if .IsHome }}ARCHITECT | {{ .Site.Params.tagline }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>

<meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta name="author" content="{{ .Site.Params.author }}" />
<link rel="canonical" href="{{ .Permalink }}" />

<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}" />
<meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}" />
<meta name="twitter:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />

<!-- Fonts: Syne (headlines) + Outfit (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- HLS.js for hero video background -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary":                  "#E9C176",
        "primary-container":        "#C5A059",
        "on-primary":               "#412d00",
        "on-primary-container":     "#4e3700",
        "surface":                  "#131313",
        "surface-dim":              "#131313",
        "surface-bright":           "#3a3939",
        "surface-container-lowest": "#0e0e0e",
        "surface-container-low":    "#1c1b1b",
        "surface-container":        "#201f1f",
        "surface-container-high":   "#2a2a2a",
        "surface-container-highest":"#353534",
        "surface-variant":          "#353534",
        "on-surface":               "#e5e2e1",
        "on-surface-variant":       "#d1c5b4",
        "outline":                  "#9a8f80",
        "outline-variant":          "#4e4639",
        "background":               "#131313",
        "on-background":            "#e5e2e1",
        "secondary":                "#c8c6c5",
        "secondary-container":      "#4a4949",
        "on-secondary":             "#313030",
        "tertiary":                 "#c6c6c7",
        "error":                    "#ffb4ab",
        "inverse-surface":          "#e5e2e1",
        "inverse-on-surface":       "#313030",
        "inverse-primary":          "#775a19",
        "surface-tint":             "#e9c176",
      },
      fontFamily: {
        "headline": ["Syne", "sans-serif"],
        "body":     ["Outfit", "sans-serif"],
        "label":    ["Outfit", "sans-serif"],
      },
      borderRadius: {
        "DEFAULT": "0px", "sm": "0px", "md": "0px", "lg": "0px", "xl": "0px", "full": "9999px",
      },
      animation: {
        "slow-zoom":    "zoom 20s infinite alternate linear",
        "marquee":      "marquee 30s linear infinite",
        "pulse-scroll": "pulseScroll 2s cubic-bezier(0.4,0,0.6,1) infinite",
        "reveal":       "reveal 1.2s cubic-bezier(0.16,1,0.3,1) forwards",
      },
      keyframes: {
        zoom:        { "0%": { transform: "scale(1)" },   "100%": { transform: "scale(1.1)" } },
        reveal:      { "0%": { opacity:"0", transform:"translateY(60px)" }, "100%": { opacity:"1", transform:"translateY(0)" } },
        marquee:     { "0%": { transform: "translateX(0)" }, "100%": { transform: "translateX(-50%)" } },
        pulseScroll: { "0%,100%": { opacity:"1", height:"40px" }, "50%": { opacity:".3", height:"20px" } },
      },
      transitionTimingFunction: { "cinematic": "cubic-bezier(0.16,1,0.3,1)" },
      transitionDuration:       { "600": "600ms" },
    },
  },
}
</script>

<link rel="stylesheet" href="{{ "css/main.css" | relURL }}" />
